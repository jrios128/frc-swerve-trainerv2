<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FRC Swerve Driver Trainerv2</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar">

<select id="mode">
<option value="field">Field Oriented</option>
<option value="robot">Robot Oriented</option>
</select>

<div id="timer">2:00</div>

<div class="score">
Score: <span id="score">0</span>
</div>

<button onclick="startTimer()">Start</button>
<button onclick="resetTimer()">Reset</button>

</div>

<canvas id="field"></canvas>

<div id="leftJoystick" class="joystick">
<div class="stick"></div>
</div>

<div id="rightJoystick" class="joystick">
<div class="stick"></div>
</div>
  

<div class="help">
WASD = Translate | Q/E = Rotate | Xbox Controller Supported | Mobile Joystick
</div>

<script src="field.js"></script>
<script src="robot.js"></script>
<script src="physics.js"></script>
<script src="controls.js"></script>
<script src="aiBots.js"></script>
<script src="scoring.js"></script>
<script src="timer.js"></script>
<script src="app.js"></script>

</body>
</html>
